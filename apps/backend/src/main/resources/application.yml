spring:
  application:
    name: campus-delivery-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/campus_delivery}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-strong-32-byte-minimum-secret}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.upes.campusdelivery: INFO
