services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: campus_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./apps/backend
    depends_on:
      - postgres
      - redis
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/campus_delivery
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./apps/frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
